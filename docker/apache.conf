<VirtualHost *:80>
    DocumentRoot /var/www/html
    ServerName localhost

    # Enable URL rewriting
    RewriteEngine On
    
    # Set proper MIME types for JavaScript modules
    <FilesMatch "\.(js|mjs)$">
        Header set Content-Type "application/javascript"
    </FilesMatch>
    
    # Frontend routing - serve index.html for all non-API routes
    RewriteCond %{REQUEST_URI} !^/backend
    RewriteCond %{REQUEST_URI} !^/upload
    RewriteCond %{REQUEST_URI} !^/assignment
    RewriteCond %{REQUEST_URI} !^/assets
    RewriteCond %{REQUEST_URI} !\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^(.*)$ /index.html [L]

    # API routing
    Alias /api /var/www/html/backend/api

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/backend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/upload>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/assignment>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
